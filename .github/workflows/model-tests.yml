name: model-tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  privacy-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python scripts/privacy_guard.py
      - name: ETF shadow tests
        working-directory: models/etf_shadow_v063
        run: python -m unittest discover -s tests -v
      - name: Options evidence tests
        working-directory: models/meituan_options_v12
        run: python -m unittest discover -s tests -v
